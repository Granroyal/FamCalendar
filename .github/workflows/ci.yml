name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install UV
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run --with pytest pytest

      - name: Run code analysis
        run: uv run --with ruff ruff check .

      - name: Run type checks
        run: uv run --with mypy mypy --ignore-missing-imports FamCalender/backend FamCalender/frontend/streamlit.py
